name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build FAP
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build with ufbt
        uses: flipperdevices/flipperzero-ufbt-action@v0
        with:
          sdk-channel: release
          app-dir: .

      - name: Upload FAP artifact
        uses: actions/upload-artifact@v4
        with:
          name: flipp_coin-${{ github.sha }}
          path: dist/*.fap
          if-no-files-found: error
          retention-days: 30

  release:
    name: Attach FAP to Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build with ufbt
        uses: flipperdevices/flipperzero-ufbt-action@v0
        with:
          sdk-channel: release
          app-dir: .

      - name: Upload FAP to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.fap
          fail_on_unmatched_files: true
